services:
  envio-postgres:
    image: postgres:17.5
    container_name: fx-trader-profiles-envio-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:${ENVIO_PG_EXTERNAL_PORT:-5438}:5432"
    volumes:
      - envio-indexer-storage:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${ENVIO_PG_PASSWORD:?set ENVIO_PG_PASSWORD in .env}
      POSTGRES_USER: ${ENVIO_PG_USER:-postgres}
      POSTGRES_DB: ${ENVIO_PG_DATABASE:-envio-dev}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 40
      start_period: 5s

  envio-hasura:
    image: hasura/graphql-engine:v2.43.0
    container_name: fx-trader-profiles-envio-hasura
    restart: unless-stopped
    depends_on:
      envio-postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:${HASURA_EXTERNAL_PORT:-8088}:8080"
    environment:
      HASURA_GRAPHQL_DATABASE_URL: postgres://${ENVIO_PG_USER:-postgres}:${ENVIO_PG_PASSWORD:?set ENVIO_PG_PASSWORD in .env}@envio-postgres:5432/${ENVIO_PG_DATABASE:-envio-dev}
      HASURA_GRAPHQL_ENABLE_CONSOLE: ${HASURA_GRAPHQL_ENABLE_CONSOLE:-true}
      HASURA_GRAPHQL_ENABLED_LOG_TYPES: startup,http-log,webhook-log,websocket-log,query-log
      HASURA_GRAPHQL_NO_OF_RETRIES: 10
      HASURA_GRAPHQL_ADMIN_SECRET: ${HASURA_GRAPHQL_ADMIN_SECRET:?set HASURA_GRAPHQL_ADMIN_SECRET in .env}
      HASURA_GRAPHQL_STRINGIFY_NUMERIC_TYPES: "true"
      HASURA_GRAPHQL_UNAUTHORIZED_ROLE: public
      PORT: 8080
    healthcheck:
      test: ["CMD-SHELL", "timeout 1s bash -c ':> /dev/tcp/127.0.0.1/8080' || exit 1"]
      interval: 5s
      timeout: 2s
      retries: 50
      start_period: 5s

  envio-indexer:
    build:
      context: .
      dockerfile: apps/indexer/Dockerfile
    container_name: fx-trader-profiles-envio-indexer
    restart: on-failure
    depends_on:
      rpc-router:
        condition: service_healthy
      envio-hasura:
        condition: service_healthy
    ports:
      - "127.0.0.1:${ENVIO_INDEXER_EXTERNAL_PORT:-9898}:${ENVIO_INDEXER_PORT:-9898}"
    environment:
      ENVIO_API_TOKEN: ${ENVIO_API_TOKEN:-}
      ENVIO_RPC_URL: http://rpc-router:8545
      ENVIO_PG_PASSWORD: ${ENVIO_PG_PASSWORD:?set ENVIO_PG_PASSWORD in .env}
      ENVIO_PG_HOST: envio-postgres
      ENVIO_PG_PORT: 5432
      ENVIO_PG_USER: ${ENVIO_PG_USER:-postgres}
      ENVIO_PG_DATABASE: ${ENVIO_PG_DATABASE:-envio-dev}
      ENVIO_PG_PUBLIC_SCHEMA: ${ENVIO_PG_PUBLIC_SCHEMA:-envio}
      ENVIO_INDEXER_HOST: 0.0.0.0
      ENVIO_INDEXER_PORT: ${ENVIO_INDEXER_PORT:-9898}
      CONFIG_FILE: config.yaml
      LOG_LEVEL: ${ENVIO_LOG_LEVEL:-info}
      LOG_STRATEGY: ${ENVIO_LOG_STRATEGY:-console-pretty}
      HASURA_GRAPHQL_ENDPOINT: http://envio-hasura:8080/v1/metadata
      HASURA_GRAPHQL_ADMIN_SECRET: ${HASURA_GRAPHQL_ADMIN_SECRET:?set HASURA_GRAPHQL_ADMIN_SECRET in .env}
      HASURA_SERVICE_HOST: envio-hasura
      HASURA_SERVICE_PORT: 8080
      TUI_OFF: ${TUI_OFF:-true}

volumes:
  envio-indexer-storage:
