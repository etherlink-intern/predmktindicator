services:
  postgres:
    image: postgres:16-alpine
    container_name: fx-trader-profiles-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fx_trader_profiles}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-fx_trader_profiles}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  rpc-router:
    image: ${RPC_ROUTER_IMAGE:-fx-trader-profiles-rpc-router:local}
    build:
      context: .
      dockerfile: apps/rpc-router/Dockerfile
    container_name: fx-trader-profiles-rpc-router
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8545
      RPC_ROUTER_HOST: 0.0.0.0
      ETHEREUM_RPC_URL: ${ETHEREUM_RPC_URL:-}
      ETHEREUM_RPC_FALLBACK_URLS: ${ETHEREUM_RPC_FALLBACK_URLS:-}
      CHAINLIST_ETHEREUM_RPC_URLS: ${CHAINLIST_ETHEREUM_RPC_URLS:-}
      GOLDSKY_RPC_URL: ${GOLDSKY_RPC_URL:-}
      CHAINSTACK_RPC_URL: ${CHAINSTACK_RPC_URL:-}
      ALCHEMY_RPC_URL: ${ALCHEMY_RPC_URL:-}
      CHAINLIST_RPC_SOURCE_URL: ${CHAINLIST_RPC_SOURCE_URL:-https://chainlist.org/rpcs.json}
      CHAINID_RPC_SOURCE_URL: ${CHAINID_RPC_SOURCE_URL:-https://chainid.network/chains/eip155-1.json}
      RPC_TIMEOUT_MS: ${RPC_TIMEOUT_MS:-8000}
      RPC_PROVIDER_COOLDOWN_SECONDS: ${RPC_PROVIDER_COOLDOWN_SECONDS:-60}
      RPC_MAX_RETRIES: ${RPC_MAX_RETRIES:-2}
      RPC_MAX_GET_LOGS_BLOCK_RANGE: ${RPC_MAX_GET_LOGS_BLOCK_RANGE:-2000}
      RPC_MAX_DYNAMIC_PROVIDERS: ${RPC_MAX_DYNAMIC_PROVIDERS:-24}
      RPC_MAX_PROVIDERS: ${RPC_MAX_PROVIDERS:-32}
      RPC_HEALTH_CHECK_CONCURRENCY: ${RPC_HEALTH_CHECK_CONCURRENCY:-8}
      RPC_MAX_BLOCK_LAG: ${RPC_MAX_BLOCK_LAG:-128}
    ports:
      - "${RPC_ROUTER_BIND_HOST:-127.0.0.1}:${RPC_ROUTER_PORT:-18545}:8545"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8545/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  web:
    image: ${APP_IMAGE:-fx-trader-profiles-web:local}
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: runner
    container_name: fx-trader-profiles-web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      GOLDSKY_SUBGRAPH_URL: ${GOLDSKY_SUBGRAPH_URL:-}
      GOLDSKY_API_KEY: ${GOLDSKY_API_KEY:-}
      THE_GRAPH_SUBGRAPH_URL: ${THE_GRAPH_SUBGRAPH_URL:-}
      GOLDSKY_RPC_URL: ${GOLDSKY_RPC_URL:-}
      CHAINSTACK_RPC_URL: ${CHAINSTACK_RPC_URL:-}
      ALCHEMY_RPC_URL: ${ALCHEMY_RPC_URL:-}
      ETHEREUM_RPC_URL: ${ETHEREUM_RPC_URL:-}
      ETHEREUM_RPC_FALLBACK_URLS: ${ETHEREUM_RPC_FALLBACK_URLS:-}
      CHAINLIST_ETHEREUM_RPC_URLS: ${CHAINLIST_ETHEREUM_RPC_URLS:-}
      RPC_ROUTER_URL: ${RPC_ROUTER_URL:-http://rpc-router:8545}
      FX_PUBLIC_RPC_FALLBACK_URLS: ${FX_PUBLIC_RPC_FALLBACK_URLS:-}
      FX_ENABLE_PUBLIC_RPC_FALLBACKS: ${FX_ENABLE_PUBLIC_RPC_FALLBACKS:-true}
      FX_RPC_MAX_ENDPOINT_ATTEMPTS: ${FX_RPC_MAX_ENDPOINT_ATTEMPTS:-8}
      FX_RPC_BATCH_SIZE: ${FX_RPC_BATCH_SIZE:-8}
      RPC_PROVIDER_COOLDOWN_SECONDS: ${RPC_PROVIDER_COOLDOWN_SECONDS:-60}
      ETHERSCAN_API_KEY: ${ETHERSCAN_API_KEY:-}
      FX_LEADERBOARD_API_URL: ${FX_LEADERBOARD_API_URL:-}
      SMARTCLAW_BASE_URL: ${SMARTCLAW_BASE_URL:-https://alidashboard.up.railway.app}
      SMARTCLAW_SITE_URL: ${SMARTCLAW_SITE_URL:-https://smartclaw.xyz}
      ENVIO_HASURA_QUERY_URL: ${ENVIO_HASURA_QUERY_URL:-http://envio-hasura:8080/v2/query}
      HASURA_GRAPHQL_ADMIN_SECRET: ${HASURA_GRAPHQL_ADMIN_SECRET:-}
      CRON_SECRET: ${CRON_SECRET:?CRON_SECRET is required}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-fx-trader-profiles}
      NEXT_PUBLIC_DEFAULT_CHAIN_ID: ${NEXT_PUBLIC_DEFAULT_CHAIN_ID:-1}
    ports:
      - "${WEB_BIND_HOST:-127.0.0.1}:${WEB_PORT:-3000}:3000"
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  cron:
    image: alpine:3.20
    container_name: fx-trader-profiles-cron
    restart: unless-stopped
    depends_on:
      web:
        condition: service_started
    environment:
      APP_URL: ${APP_URL:-http://web:3000}
      CRON_SECRET: ${CRON_SECRET:?CRON_SECRET is required}
    command:
      - /bin/sh
      - -c
      - |
        apk add --no-cache curl tzdata >/dev/null
        auth_header="Authorization: Bearer $${CRON_SECRET}"
        cat > /etc/crontabs/root <<EOF_CRON
        0 */6 * * * curl -fsS -X POST "$${APP_URL}/api/jobs/sync-current-positions" -H "$${auth_header}" >> /var/log/cron.log 2>&1
        5 */6 * * * curl -fsS -X POST "$${APP_URL}/api/jobs/sync-subgraph" -H "$${auth_header}" >> /var/log/cron.log 2>&1
        10 */6 * * * curl -fsS -X POST "$${APP_URL}/api/jobs/enrich-positions" -H "$${auth_header}" >> /var/log/cron.log 2>&1
        15 */6 * * * curl -fsS -X POST "$${APP_URL}/api/jobs/compute-trader-metrics" -H "$${auth_header}" >> /var/log/cron.log 2>&1
        EOF_CRON
        crond -f -l 8


  postgres-backup:
    image: prodrigestivill/postgres-backup-local:16-alpine
    container_name: fx-trader-profiles-postgres-backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-fx_trader_profiles}
      POSTGRES_USER: ${POSTGRES_USER:-fx_trader_profiles}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      SCHEDULE: ${POSTGRES_BACKUP_SCHEDULE:-@daily}
      BACKUP_KEEP_DAYS: ${POSTGRES_BACKUP_KEEP_DAYS:-7}
      BACKUP_KEEP_WEEKS: ${POSTGRES_BACKUP_KEEP_WEEKS:-4}
      BACKUP_KEEP_MONTHS: ${POSTGRES_BACKUP_KEEP_MONTHS:-3}
      HEALTHCHECK_PORT: 8080
    volumes:
      - postgres-backups:/backups

  watchtower:
    image: containrrr/watchtower:latest
    container_name: fx-trader-profiles-watchtower
    profiles: ["updates"]
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_POLL_INTERVAL: ${WATCHTOWER_POLL_INTERVAL:-86400}
      WATCHTOWER_CLEANUP: ${WATCHTOWER_CLEANUP:-true}
      WATCHTOWER_INCLUDE_RESTARTING: ${WATCHTOWER_INCLUDE_RESTARTING:-true}
      WATCHTOWER_LABEL_ENABLE: ${WATCHTOWER_LABEL_ENABLE:-true}
    command: --label-enable

volumes:
  postgres-data:
  postgres-backups:
