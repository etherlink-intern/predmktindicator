# yaml-language-server: $schema=./node_modules/envio/evm.schema.json
name: fx-trader-profiles-local-indexer
description: Local Envio HyperIndex f(x) Protocol starter indexer wired through the predmktindicator RPC router.

raw_events: false
field_selection:
  transaction_fields:
    - hash
    - from
    - to

contracts:
  - name: FxLifecycle
    events:
      # Lifecycle events are kept in the ABI surface for deployment-window experiments.
      - event: "Upgraded(address indexed implementation)"
      - event: "AdminChanged(address previousAdmin, address newAdmin)"
      - event: "OwnershipTransferred(address indexed previousOwner, address indexed newOwner)"
      # f(x) position pools are ERC-721 style position tokens; Transfer tracks ownership.
      - event: "Transfer(address indexed from, address indexed to, uint256 indexed tokenId)"

chains:
  - id: 1
    # Bounded f(x) starter pass over a compact WstETH LongPool window with
    # observed real position Transfer activity.
    start_block: 23689392
    end_block: 23690000
    rpc:
      - url: ${ENVIO_RPC_URL}
        for: sync
      - url: ${ENVIO_RPC_URL}
        for: fallback
    contracts:
      - name: FxLifecycle
        address:
          - "0x6Ecfa38FeE8a5277B91eFdA204c235814F0122E8" # WstETHLongPool
