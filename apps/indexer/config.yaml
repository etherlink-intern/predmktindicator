# yaml-language-server: $schema=./node_modules/envio/evm.schema.json
name: fx-trader-profiles-local-indexer
description: Local Envio HyperIndex smoke indexer wired through the predmktindicator RPC router.

# This is intentionally a small ERC-20 smoke indexer until f(x) contracts/ABIs are
# verified and pinned in contracts/fx-v2.json. It proves the local Envio +
# rpc-router plumbing without pretending to index live f(x) product data.
contracts:
  - name: ERC20Smoke
    events:
      - event: "Transfer(address indexed from, address indexed to, uint256 value)"

chains:
  - id: 1
    # Keep this narrow and deterministic for local POC. UNI's first mint occurs
    # at block 10861674, so the indexer can prove event handling without a full
    # historical backfill.
    start_block: 10861674
    end_block: 10861766
    rpc:
      - url: ${ENVIO_RPC_URL}
        for: sync
      - url: ${ENVIO_RPC_URL}
        for: fallback
    contracts:
      - name: ERC20Smoke
        address: "0x1f9840a85d5aF5bf1D1762F925BDADdC4201F984" # UNI token smoke target
