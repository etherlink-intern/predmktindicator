type FxContract {
  # Lowercase Ethereum contract address.
  id: ID!
  name: String!
  category: String!
  side: String
  collateral: String
  observedEventCount: Int!
  firstObservedBlock: Int
  lastObservedBlock: Int
}

type FxEvent {
  # chain:block:logIndex
  id: ID!
  contract: FxContract!
  eventName: String!
  blockNumber: Int!
  blockTimestamp: Int!
  transactionHash: String!
  logIndex: Int!
}

type FxPositionTransfer {
  # chain:block:logIndex
  id: ID!
  contract: FxContract!
  tokenId: BigInt!
  from: String!
  to: String!
  blockNumber: Int!
  blockTimestamp: Int!
  transactionHash: String!
  logIndex: Int!
}
