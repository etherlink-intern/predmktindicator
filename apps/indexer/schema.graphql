  tick: Int!
  collShares: BigInt!
  debtShares: BigInt!
  price: BigInt!
  blockNumber: Int!
  blockTimestamp: Int!
  transactionHash: String!
  logIndex: BigInt!
}

type FxTickMovement {
  id: ID!
  contract: FxContract!
  pool: String!
